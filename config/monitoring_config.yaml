# Monitoring configuration

metrics:
  balance_mae_threshold: 0.42
  drift_threshold: 0.2

drift:
  enabled: true
  method: cusum                    # cusum | shiryayev_roberts
  signal: residuals
  min_observations: 30
  cusum:
    k: 0.5
    h: 5.0
  shiryayev_roberts:
    alpha: 0.01
    delta: 1.0
    threshold: 50.0
  actions:
    on_alarm:
      - manual_control
      - unplanned_retrain

artifacts:
  drift_baseline: artifacts/drift_baseline.json
  residual_history: artifacts/residual_history.json
  drift_status: artifacts/drift_status.json
  drift_alerts_dir: drift_alerts

alerts:
  enable_prometheus: true
  enable_grafana: true
